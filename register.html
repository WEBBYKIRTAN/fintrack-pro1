<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FinTrack Pro</title>
    <link rel="stylesheet" href="./register.css">
</head>
<body>
    <div class="register-card">
        <h2>Create Account</h2>
        <p>Join FinTrack Pro</p>
        <form action="" id="register-form">
            <div class="register-grp">
                <label for="registerUsername">Choose a Username</label>
                <input type="text" id="registerUsername" required>
            </div>
            <div class="register-grp">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" required>
            </div>
            <button type="submit" id="register">Register</button>
        </form>
        <p id="login-details">Already have an account?
            <a href="./login.html">Login Here</a>
        </p>
    </div>
    <script>
        // Apply saved theme so register matches the rest of the app
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }

        document.getElementById('register-form').addEventListener("submit", function (e) {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;

            localStorage.setItem("username", username);
            localStorage.setItem("password", password);
            alert("Registration successful");
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
